<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <meta
      name="description"
      content="Zakarya Chaib is a full-stack developer building polished React, Node.js, and AI-powered products for modern teams."
    />
    <meta name="theme-color" content="#111313" />
    <script>
      (function () {
        const saved = localStorage.getItem('theme')
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
        const theme = saved === 'light' || saved === 'dark' ? saved : prefersDark ? 'dark' : 'dark'
        document.documentElement.setAttribute('data-theme', theme)
      })()
    </script>
    <title>Zakarya Chaib | Full-Stack Developer</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
